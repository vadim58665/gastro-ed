# Railway.app конфигурация для Python backend.
#
# Два сервиса: `api` (uvicorn) и `worker` (RQ). Redis добавляется плагином в
# Railway UI; URL пробрасывается через переменную REDIS_URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 10

# Сервис-специфичные команды задаются в Railway UI:
# - api:    uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2
# - worker: python -m app.workers.run_worker
#
# Для локальной разработки используйте docker-compose.yml из корня репо.
