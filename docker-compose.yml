services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gastroed-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/srv/app:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  redis:
    image: redis:7-alpine
    container_name: gastroed-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gastroed-worker
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.workers.run_worker"]
    volumes:
      - ./backend/app:/srv/app:ro
